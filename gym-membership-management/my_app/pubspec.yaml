name: my_app
description: "Gym Ops - Gym Membership Management Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  just_audio: ^0.9.36
  url_launcher: ^6.3.0
  app_links: ^6.3.2
  crypto: ^3.0.3
  google_fonts: ^6.2.1
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "playstore_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
